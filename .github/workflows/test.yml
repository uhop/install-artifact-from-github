name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: ${{matrix.os}} / Node ${{matrix.node}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, node: 22}
          - {os: ubuntu-latest, node: 24}
          - {os: ubuntu-latest, node: 26}
          - {os: macos-latest, node: 24}
          - {os: windows-latest, node: 24}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node}}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: js-check
        run: npm run js-check
      - name: Tests
        run: npm test
